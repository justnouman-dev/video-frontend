<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLUX STREAM</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>

<style>
body{background:#0b0d12;color:#fff;font-family:sans-serif;text-align:center;padding:40px}
input{width:60%;padding:12px;border-radius:6px;border:none;margin-right:10px}
button{padding:12px 20px;border:none;border-radius:6px;background:#e8ff47;color:#000;cursor:pointer}
video{width:80%;margin-top:20px;background:#000}
</style>
</head>

<body>

<h1>FLUX STREAM</h1>

<input id="videoUrl" placeholder="Paste .mp4 or .m3u8 URL">
<button onclick="handleLoad()">LOAD</button>

<p id="status"></p>

<video id="video" controls preload="auto"></video>

<script>
const BACKEND_URL = "https://video-backend-99rs.onrender.com";

let hls;

function showStatus(msg){
  document.getElementById("status").innerText = msg;
}

function loadHLS(url){
  const video = document.getElementById("video");

  if(hls){
    hls.destroy();
    hls = null;
  }

  video.pause();
  video.removeAttribute("src");

  if(Hls.isSupported()){
    hls = new Hls({
      maxBufferLength: 600
    });

    hls.loadSource(url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
      showStatus("Ready ▶ Press play");
    });

  } else if(video.canPlayType("application/vnd.apple.mpegurl")){
    video.src = url;
  } else {
    showStatus("HLS not supported");
  }
}

async function handleLoad(){
  const url = document.getElementById("videoUrl").value.trim();

  if(!url){
    showStatus("Enter URL");
    return;
  }

  showStatus("Processing...");

  // ✅ DIRECT STREAM
  if(url.endsWith(".m3u8")){
    loadHLS(url);
    showStatus("Streaming directly");
    return;
  }

  // ❌ ONLY MP4
  if(!url.endsWith(".mp4")){
    showStatus("Only .mp4 or .m3u8 supported");
    return;
  }

  try{
    const res = await fetch(`${BACKEND_URL}/convert`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ url })
    });

    const data = await res.json();

    if(!res.ok){
      throw new Error(data.error || "Conversion failed");
    }

    loadHLS(data.streamUrl);
    showStatus("Converted & streaming");

  }catch(err){
    showStatus("Error: " + err.message);
  }
}
</script>

</body>
</html>
